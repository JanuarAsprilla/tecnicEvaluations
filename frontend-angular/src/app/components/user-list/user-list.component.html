<h2>Lista de Usuarios</h2>

<!-- Contenedor de botones -->
<div class="button-container">
  <button (click)="createUser()" class="btn btn-success">➕ Crear Usuario</button>
</div>

<table class="user-table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>Telefono</th>
      <th>Sitio Web</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.id }}</td>
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>
      <td>{{user.phone}}</td>
      <td> {{user.website}} </td>
      <td>
        <button class="btn btn-warning" (click)="editUser(user.id!)">✏ Editar</button>
        <button (click)="deleteUser(user.id!)" class="btn btn-danger">🗑 Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>
