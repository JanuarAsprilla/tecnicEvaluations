<div class="form-container">
  <h1 class="form-title">
    {{ isEdit ? "Editar Usuario" : "Crear Usuario" }}
  </h1>

  <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="form">
    <!-- Nombre -->
    <div class="form-group">
      <label for="name">Nombre</label>
      <input type="text" id="name" formControlName="name" placeholder="Ingrese su nombre" />
      <div *ngIf="userForm.get('name')?.touched || userForm.get('name')?.dirty">
        <small class="error" *ngIf="userForm.get('name')?.hasError('required')">
          El nombre es obligatorio.
        </small>
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" formControlName="email" placeholder="Ingrese su email" />
      <div *ngIf="userForm.get('email')?.touched || userForm.get('email')?.dirty">
        <small class="error" *ngIf="userForm.get('email')?.hasError('required')">
          El email es obligatorio.
        </small>
        <small class="error" *ngIf="userForm.get('email')?.hasError('email')">
          Ingrese un email válido.
        </small>
      </div>
    </div>

    <!-- Teléfono -->
    <div class="form-group">
      <label for="phone">Teléfono</label>
      <input type="tel" id="phone" formControlName="phone" placeholder="Ingrese su número de teléfono" />
      <div *ngIf="userForm.get('phone')?.touched || userForm.get('phone')?.dirty">
        <small class="error" *ngIf="userForm.get('phone')?.hasError('required')">
          El teléfono es obligatorio.
        </small>
      </div>
    </div>

    <!-- Sitio Web -->
    <div class="form-group">
      <label for="website">Sitio Web</label>
      <input type="text" id="website" formControlName="website" placeholder="Ingrese su sitio web" />
    </div>

    <!-- Botones -->
    <button type="submit" class="form-button">
      {{ isEdit ? "Actualizar" : "Crear" }}
    </button>

    <button type="button" class="form-button-volver" (click)="goHome()">
      Volver
    </button>
  </form>

  <!-- Mensaje de éxito -->
  <div *ngIf="isSaved" class="success-message">
    Usuario {{ isEdit ? "actualizado" : "creado" }} exitosamente ✔️
  </div>
</div>
